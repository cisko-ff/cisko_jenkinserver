<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Leche Flan</title>


<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:
            linear-gradient(rgba(30,20,10,0.65), rgba(30,20,10,0.65)),
            url('https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?auto=format&fit=crop&w=1600&q=80');
        background-size:cover;
        background-position:center;
        font-family:'Poppins', sans-serif;
        color:#fff;
    }

    .royal-card{
        max-width:850px;
        width:90%;
        padding:40px;
        text-align:center;
        background:rgba(255,248,235,0.95);
        border:6px solid #d4af37;
        border-radius:20px;
        box-shadow:0 20px 50px rgba(0,0,0,0.4);
        position:relative;
        overflow:hidden;
    }

    .royal-card::before{
        content:"";
        position:absolute;
        inset:10px;
        border:2px solid #c89b2b;
        border-radius:12px;
        pointer-events:none;
    }

    h1{
        font-family:'Georgia', serif;
        font-size:3rem;
        color:#8b6508;
        text-transform:uppercase;
        letter-spacing:3px;
        margin-bottom:10px;
    }

    .subtitle{
        color:#6b5b2a;
        font-size:1rem;
        margin-bottom:25px;
        font-style:italic;
    }

    img{
        width:100%;
        max-width:500px;
        border-radius:15px;
        border:4px solid #d4af37;
        box-shadow:0 15px 35px rgba(0,0,0,0.25);
        transition:0.4s ease;
    }

    img:hover{
        transform:scale(1.03);
    }

    .description{
        margin-top:25px;
        font-size:1.1rem;
        color:#4b3b18;
        line-height:1.8;
    }

    .crown{
        font-size:2.5rem;
        color:#d4af37;
        margin-bottom:10px;
    }
.button {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 24px;
        background-color: #9c27b0;
        color: white;
        text-decoration: none;
        border-radius: 30px;
        transition: background-color 0.3s;
    }

    .button:hover {
        background-color: #7b1fa2;
    }

</style>
</head>

<body>

<div class="royal-card">

    <div class="crown">👑</div>

    <h1>Leche Flan</h1>

    <p class="subtitle">The Golden Crown Jewel of Filipino Desserts</p>

    <img
        src="https://bitesbybianca.com/wp-content/uploads/2024/12/filipino-leche-flan-1.jpg"
        alt="Silky leche flan with shiny caramel top"
    >

    <p class="description">
        Rich, silky, and adorned with a luxurious caramel glaze, this royal
        leche flan embodies elegance in every bite. Its golden sheen and
        velvety texture make it a dessert worthy of a grand feast.
    </p>

	<a href="hotdog.html" class="button">Eat More</a>

</div>

</body>
</html>
